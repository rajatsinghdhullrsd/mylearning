# this is the name of the workflow that ll appear in actions tab

name : CICD

# this is a manualclick (deliver) workflow whenever userneeds and will not autorun

on :
   workflow_dispatch:

jobs:
    code:
       runs-on: ubuntu-latest
       steps:
          - name : checkout code
            run: echo "code clone from github"

    build:
        runs-on: ubuntu-latest
        steps: 
            - name : Build docker container
              run: echo "docker container build"
              
    test:
        runs-on: ubuntu-latest
        steps:
            - name : test the container
              run : echo "testing the container"

    deploy:
        runs-on: ubuntu-latest
        steps:
            - name : deploying the app
              run : echo "docker compose deployed the app"
